<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="hdrGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" rx="14" fill="#f8fafc"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1000" height="48" rx="14" fill="url(#hdrGrad)"/>
  <rect x="0" y="24" width="1000" height="24" fill="url(#hdrGrad)"/>
  <text x="500" y="32" text-anchor="middle" fill="white" font-size="19" font-weight="bold">Data Security — OBO Authentication &amp; Tool-Level Authorization</text>

  <!-- ═══════ MAIN FLOW: User → SPA → Backend → Foundry Agent → MCP Server → Atlassian ═══════ -->

  <!-- User -->
  <rect x="28" y="72" width="100" height="80" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="78" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">User</text>
  <text x="78" y="115" text-anchor="middle" font-size="10" fill="#64748b">Entra ID</text>
  <text x="78" y="130" text-anchor="middle" font-size="10" fill="#64748b">identity</text>

  <!-- Arrow User → SPA -->
  <line x1="128" y1="112" x2="165" y2="112" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- React SPA -->
  <rect x="170" y="74" width="110" height="76" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="225" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">React SPA</text>
  <text x="225" y="114" text-anchor="middle" font-size="10" fill="#3b82f6">MSAL login</text>
  <text x="225" y="130" text-anchor="middle" font-size="10" fill="#3b82f6">Token acquire</text>

  <!-- Arrow SPA → Backend -->
  <line x1="280" y1="112" x2="317" y2="112" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="298" y="104" text-anchor="middle" font-size="8" fill="#2563eb" font-weight="bold">Bearer</text>

  <!-- FastAPI Backend -->
  <rect x="322" y="74" width="120" height="76" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="382" y="97" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">Backend API</text>
  <text x="382" y="114" text-anchor="middle" font-size="10" fill="#7c3aed">JWT validate</text>
  <text x="382" y="130" text-anchor="middle" font-size="10" fill="#7c3aed">OBO exchange</text>

  <!-- Arrow Backend → Foundry -->
  <line x1="442" y1="112" x2="479" y2="112" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="460" y="104" text-anchor="middle" font-size="8" fill="#7c3aed" font-weight="bold">OBO</text>

  <!-- Foundry Agent -->
  <rect x="484" y="68" width="140" height="88" rx="10" fill="#fce4ec" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="554" y="91" text-anchor="middle" font-size="12" font-weight="bold" fill="#be123c">Foundry Agent</text>
  <text x="554" y="108" text-anchor="middle" font-size="10" fill="#e11d48">gpt-4.1-mini</text>
  <rect x="496" y="116" width="56" height="20" rx="4" fill="#fecdd3" stroke="#fda4af" stroke-width="0.8"/>
  <text x="524" y="130" text-anchor="middle" font-size="8" fill="#be123c">MCP Tool</text>
  <rect x="558" y="116" width="56" height="20" rx="4" fill="#fecdd3" stroke="#fda4af" stroke-width="0.8"/>
  <text x="586" y="130" text-anchor="middle" font-size="8" fill="#be123c">Fabric</text>

  <!-- Arrow Foundry → MCP Server -->
  <line x1="624" y1="112" x2="661" y2="112" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="642" y="104" text-anchor="middle" font-size="8" fill="#e11d48" font-weight="bold">OBO token</text>

  <!-- MCP Server (big box encompassing auth + authz) -->
  <rect x="666" y="62" width="310" height="102" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="821" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Custom Atlassian MCP Server</text>

  <!-- Auth layer chip -->
  <rect x="680" y="92" width="90" height="30" rx="6" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
  <text x="725" y="111" text-anchor="middle" font-size="9" font-weight="bold" fill="#9a3412">① Auth</text>

  <!-- Arrow auth → authz -->
  <line x1="770" y1="107" x2="787" y2="107" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arr-green)"/>

  <!-- AccessList chip -->
  <rect x="792" y="92" width="90" height="30" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="837" y="111" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">② Filter</text>

  <!-- Arrow authz → tools -->
  <line x1="882" y1="107" x2="899" y2="107" stroke="#16a34a" stroke-width="1.3" marker-end="url(#arr-green)"/>

  <!-- Tools chip -->
  <rect x="904" y="92" width="60" height="30" rx="6" fill="#e9d5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="934" y="111" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">③ Tools</text>

  <!-- Labels under chips -->
  <text x="725" y="140" text-anchor="middle" font-size="8" fill="#78716c">Token check</text>
  <text x="837" y="140" text-anchor="middle" font-size="8" fill="#78716c">Per-user tools</text>
  <text x="934" y="140" text-anchor="middle" font-size="8" fill="#78716c">Jira / Confl.</text>

  <!-- ═══════ KEY CONCEPT: OBO token chain ═══════ -->
  <rect x="28" y="175" width="948" height="32" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.2"/>
  <text x="500" y="196" text-anchor="middle" font-size="12" fill="#854d0e" font-weight="bold">OBO Token Chain: User identity preserved at every hop — no service accounts, no privilege escalation</text>

  <!-- ═══════ SECURITY LAYERS (clean 3-column) ═══════ -->

  <text x="500" y="235" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Three Security Layers</text>

  <!-- Layer 1 -->
  <rect x="28" y="250" width="300" height="110" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="178" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">① Authentication</text>
  <text x="178" y="296" text-anchor="middle" font-size="11" fill="#57534e">Validate Atlassian OAuth token</text>
  <text x="178" y="314" text-anchor="middle" font-size="11" fill="#57534e">Decode JWT → extract user <tspan font-weight="bold">sub</tspan></text>
  <text x="178" y="332" text-anchor="middle" font-size="11" fill="#57534e">Reject invalid tokens (fail closed)</text>

  <!-- Arrow 1→2 -->
  <line x1="328" y1="305" x2="358" y2="305" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Layer 2 -->
  <rect x="363" y="250" width="300" height="110" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="513" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">② Tool-Level Authorization</text>
  <text x="513" y="296" text-anchor="middle" font-size="11" fill="#57534e">Lookup <tspan font-weight="bold">sub</tspan> in user_access_list.json</text>
  <text x="513" y="314" text-anchor="middle" font-size="11" fill="#57534e">Filter visible tools per user</text>
  <text x="513" y="332" text-anchor="middle" font-size="11" fill="#57534e">Block unauthorized tool calls</text>

  <!-- Arrow 2→3 -->
  <line x1="663" y1="305" x2="693" y2="305" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3 -->
  <rect x="698" y="250" width="278" height="110" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="837" y="275" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">③ Scoped Execution</text>
  <text x="837" y="296" text-anchor="middle" font-size="11" fill="#57534e">Forward user's OBO token</text>
  <text x="837" y="314" text-anchor="middle" font-size="11" fill="#57534e">Jira &amp; Confluence see user only</text>
  <text x="837" y="332" text-anchor="middle" font-size="11" fill="#57534e">Fabric enforces Row-Level Security</text>

  <!-- ═══════ DEMO: Premium vs Freemium ═══════ -->

  <text x="500" y="395" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Demo: Premium vs Freemium</text>

  <!-- Premium -->
  <rect x="28" y="412" width="465" height="130" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="260" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">User A — Premium</text>

  <rect x="52" y="450" width="120" height="28" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="112" y="469" text-anchor="middle" font-size="10" fill="#166534">✓ Jira</text>
  <rect x="182" y="450" width="120" height="28" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="242" y="469" text-anchor="middle" font-size="10" fill="#166534">✓ Confluence</text>
  <rect x="312" y="450" width="120" height="28" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="372" y="469" text-anchor="middle" font-size="10" fill="#166534">✓ Fabric</text>

  <text x="260" y="502" text-anchor="middle" font-size="11" fill="#57534e">All 3 tools visible and callable</text>
  <text x="260" y="521" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">"Show my Jira issues and search Confluence docs"</text>

  <!-- Freemium -->
  <rect x="516" y="412" width="460" height="130" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8" filter="url(#shadow)"/>
  <text x="746" y="438" text-anchor="middle" font-size="14" font-weight="bold" fill="#9a3412">User B — Freemium</text>

  <rect x="540" y="450" width="120" height="28" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="600" y="469" text-anchor="middle" font-size="10" fill="#166534">✓ Jira</text>
  <rect x="670" y="450" width="120" height="28" rx="6" fill="#fecdd3" stroke="#f43f5e" stroke-width="1"/>
  <text x="730" y="469" text-anchor="middle" font-size="10" fill="#be123c">✗ Confluence</text>
  <rect x="800" y="450" width="120" height="28" rx="6" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="860" y="469" text-anchor="middle" font-size="10" fill="#166534">✓ Fabric</text>

  <text x="746" y="502" text-anchor="middle" font-size="11" fill="#57534e">Confluence hidden + calls blocked</text>
  <text x="746" y="521" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">"Search Confluence" → AuthorizationError</text>

</svg>
