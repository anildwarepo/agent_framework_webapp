<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" rx="12" fill="url(#bg2)" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">MCP Inspector — How It Works</text>

  <!-- ── Developer ── -->
  <rect x="20" y="70" width="130" height="140" rx="10" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="85" y="95" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Developer</text>
  <text x="85" y="118" text-anchor="middle" font-size="10" fill="#64748b">Browser UI</text>
  <text x="85" y="138" text-anchor="middle" font-size="10" fill="#64748b">localhost:6274</text>
  <text x="85" y="158" text-anchor="middle" font-size="10" fill="#64748b">Fill args &amp; run</text>
  <text x="85" y="178" text-anchor="middle" font-size="10" fill="#64748b">View results</text>

  <!-- ── MCP Inspector (orange) ── -->
  <rect x="210" y="50" width="200" height="250" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="310" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">MCP Inspector</text>
  <!-- chips -->
  <rect x="228" y="92" width="164" height="28" rx="5" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="111" text-anchor="middle" font-size="11" fill="#9a3412">initialize</text>
  <rect x="228" y="128" width="164" height="28" rx="5" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="147" text-anchor="middle" font-size="11" fill="#9a3412">tools/list</text>
  <rect x="228" y="164" width="164" height="28" rx="5" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="183" text-anchor="middle" font-size="11" fill="#9a3412">tools/call</text>
  <rect x="228" y="200" width="164" height="28" rx="5" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="219" text-anchor="middle" font-size="11" fill="#9a3412">SSE viewer</text>
  <rect x="228" y="236" width="164" height="28" rx="5" fill="#fed7aa" stroke="#fdba74" stroke-width="1"/>
  <text x="310" y="255" text-anchor="middle" font-size="11" fill="#9a3412">JSON-RPC log</text>

  <!-- ── MCP Server (green) ── -->
  <rect x="470" y="50" width="185" height="250" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="562" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">MCP Server</text>
  <rect x="488" y="92" width="148" height="28" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="562" y="111" text-anchor="middle" font-size="11" fill="#166534">POST /mcp</text>
  <rect x="488" y="132" width="148" height="28" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="562" y="151" text-anchor="middle" font-size="11" fill="#166534">@tool functions</text>
  <rect x="488" y="172" width="148" height="28" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="562" y="191" text-anchor="middle" font-size="11" fill="#166534">Notifications</text>
  <rect x="488" y="212" width="148" height="28" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="562" y="231" text-anchor="middle" font-size="11" fill="#166534">Backend calls</text>

  <!-- ── Arrows ── -->
  <!-- Developer → Inspector -->
  <line x1="150" y1="140" x2="208" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="179" y="133" text-anchor="middle" font-size="8" fill="#64748b">click / args</text>

  <!-- Inspector → MCP Server (JSON-RPC) -->
  <line x1="410" y1="120" x2="468" y2="120" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="439" y="112" text-anchor="middle" font-size="9" font-weight="600" fill="#ea580c">JSON-RPC</text>

  <!-- MCP Server → Inspector (SSE) -->
  <line x1="468" y1="195" x2="410" y2="195" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arr-green)"/>
  <text x="439" y="215" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">SSE events</text>

  <!-- ── Bottom callout boxes ── -->
  <rect x="20" y="320" width="310" height="48" rx="6" fill="#fef9c3" stroke="#facc15" stroke-width="1.5"/>
  <text x="175" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">What you see</text>
  <text x="175" y="357" text-anchor="middle" font-size="9" fill="#854d0e">Tool list • JSON-RPC log • Live SSE stream</text>

  <rect x="350" y="320" width="310" height="48" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="505" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Why it matters</text>
  <text x="505" y="357" text-anchor="middle" font-size="9" fill="#1e40af">No agent needed • Validate streaming • Debug on the wire</text>
</svg>