server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic DNS resolution — prevents 502 when backend pods rescale/restart.
    # NAMESERVER is injected by docker-entrypoint.sh from /etc/resolv.conf.
    resolver ${NAMESERVER} valid=15s ipv6=off;
    set $fastapi_backend ${FASTAPI_BACKEND_URL};

    # Extract backend hostname for correct Host header on proxied requests.
    # Without this, nginx sends the webapp's own Host, causing SNI/routing failures.
    set $backend_host ${FASTAPI_BACKEND_HOST};

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Enable SNI so the Container Apps Envoy proxy can route HTTPS correctly.
    # Without this, nginx connects to the resolved IP and the TLS handshake fails
    # because Envoy needs the hostname via SNI to identify the target app.
    proxy_ssl_server_name on;

    # Proxy API endpoints to FastAPI backend
    location /conversation {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /events {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding off;
    }

    location /actor {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /party {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /get_faqs {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /elicitation {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /graph {
        proxy_pass $fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $backend_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
